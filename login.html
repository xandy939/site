<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By TR Alojamentos | Login</title>
    <style>
        :root {
            --primary: #1e293b;
            --brand-blue: #0284c7;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --shadow-soft: 0 10px 30px -10px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.02);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .logo { 
            font-size: 22px; 
            font-weight: 850; 
            letter-spacing: -0.5px; 
            color: var(--primary); 
            text-decoration: none;
            cursor: pointer;
        }
        .logo span { color: var(--brand-blue); font-weight: 500; margin-left: 3px; }

        .btn-voltar {
            text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 13.5px;
            padding: 10px 22px; border-radius: 100px; border: 1px solid #e2e8f0;
            background-color: var(--white); transition: all 0.2s ease;
        }
        .btn-voltar:hover { background-color: #f1f5f9; color: var(--brand-blue); }

        .wrapper-login {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
        }

        .caixa-login {
            background: var(--white); width: 100%; max-width: 440px;
            padding: 45px 40px; border-radius: 24px; box-shadow: var(--shadow-soft);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }

        .caixa-login h2 { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.8px; margin-bottom: 8px; }
        .caixa-login .subtitulo { font-size: 14.5px; color: var(--text-muted); margin-bottom: 32px; }

        .grupo-input { margin-bottom: 20px; }
        .grupo-input label {
            display: block; font-size: 13px; font-weight: 700; color: var(--text-main);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .grupo-input input {
            width: 100%; padding: 14px 16px; font-size: 15px; color: var(--primary);
            background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px;
            outline: none; transition: all 0.2s ease;
        }
        .grupo-input input:focus {
            background-color: var(--white); border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }

        .opcoes-extra {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; font-size: 13.5px;
        }
        .lembrar { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .lembrar input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--brand-blue); }
        .recuperar-link { color: var(--brand-blue); text-decoration: none; font-weight: 600; }
        .recuperar-link:hover { text-decoration: underline; }

        .btn-entrar {
            width: 100%; background: var(--brand-blue); color: var(--white); border: none;
            padding: 16px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
        }
        .btn-entrar:hover { background: #0369a1; transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(2, 132, 199, 0.4); }

        .zona-criar-conta {
            text-align: center; font-size: 14.5px; color: var(--text-muted); padding-top: 4px;
        }
        .zona-criar-conta a { color: var(--brand-blue); text-decoration: none; font-weight: 700; margin-left: 4px; }
        .zona-criar-conta a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .caixa-login { padding: 35px 24px; border-radius: 18px; }
            .caixa-login h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">By TR <span>Alojamentos</span></a>
        <a href="index.html" class="btn-voltar">← Voltar</a>
    </header>

    <div class="wrapper-login">
        <div class="caixa-login">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitulo">Introduza os seus dados para aceder à sua conta</p>

            <form id="login-form">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="opcoes-extra">
                    <label class="lembrar">
                        <input type="checkbox"> Lembrar-me
                    </label>
                    <a href="#" class="recuperar-link">Esqueceu-se da senha?</a>
                </div>

                <button type="submit" class="btn-entrar">Iniciar Sessão</button>

                <div class="zona-criar-conta">
                    Não tem uma conta?<a href="registar.html">Crie uma aqui</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-auth.js"></script>
</body>
</html>
