<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By TR Alojamentos | Criar Conta</title>
    <style>
        :root {
            --primary: #1e293b;
            --brand-blue: #0284c7;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --shadow-soft: 0 10px 30px -10px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.02);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .logo { 
            font-size: 22px; 
            font-weight: 850; 
            letter-spacing: -0.5px; 
            color: var(--primary); 
            text-decoration: none;
            cursor: pointer;
        }
        .logo span { color: var(--brand-blue); font-weight: 500; margin-left: 3px; }

        .btn-voltar {
            text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 13.5px;
            padding: 10px 22px; border-radius: 100px; border: 1px solid #e2e8f0;
            background-color: var(--white); transition: all 0.2s ease;
        }
        .btn-voltar:hover { background-color: #f1f5f9; color: var(--brand-blue); }

        .wrapper-registo {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
        }

        .caixa-registo {
            background: var(--white); width: 100%; max-width: 650px;
            padding: 45px 40px; border-radius: 24px; box-shadow: var(--shadow-soft);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }

        .caixa-registo h2 { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.8px; margin-bottom: 8px; }
        .caixa-registo .subtitulo { font-size: 14.5px; color: var(--text-muted); margin-bottom: 32px; }

        .grelha-campos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .grupo-input { position: relative; }
        .grupo-input.total { grid-column: span 2; }

        .grupo-input label {
            display: block; font-size: 12px; font-weight: 700; color: var(--text-main);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .grupo-input input, .grupo-input select {
            width: 100%; padding: 14px 16px; font-size: 15px; color: var(--primary);
            background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px;
            outline: none; transition: all 0.2s ease;
        }

        .grupo-input input:focus, .grupo-input select:focus {
            background-color: var(--white); border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }

        .btn-registar {
            width: 100%; background: var(--brand-blue); color: var(--white); border: none;
            padding: 16px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
        }
        .btn-registar:hover { background: #0369a1; transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(2, 132, 199, 0.4); }

        .link-login { text-align: center; font-size: 14px; color: var(--text-muted); }
        .link-login a { color: var(--brand-blue); text-decoration: none; font-weight: 600; }
        .link-login a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .grelha-campos { grid-template-columns: 1fr; gap: 16px; }
            .grupo-input.total { grid-column: span 1; }
            .caixa-registo { padding: 35px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">By TR <span>Alojamentos</span></a>
        <a href="login.html" class="btn-voltar">← Voltar</a>
    </header>

    <div class="wrapper-registo">
        <div class="caixa-registo">
            <h2>Criar nova conta</h2>
            <p class="subtitulo">Preencha os dados abaixo para começar a reservar</p>

            <form id="register-form">
                <div class="grelha-campos">
                    <div class="grupo-input">
                        <label for="nome">Primeiro Nome</label>
                        <input type="text" id="nome" placeholder="Ex: João" required>
                    </div>
                    <div class="grupo-input">
                        <label for="apelido">Apelido</label>
                        <input type="text" id="apelido" placeholder="Ex: Silva" required>
                    </div>

                    <div class="grupo-input">
                        <label for="idade">Idade</label>
                        <input type="number" id="idade" min="18" placeholder="Mínimo 18" required>
                    </div>
                    <div class="grupo-input">
                        <label for="sexo">Sexo</label>
                        <select id="sexo" required>
                            <option value="" disabled selected>Selecione...</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Prefiro não dizer</option>
                        </select>
                    </div>

                    <div class="grupo-input total">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="grupo-input total">
                        <label for="telefone">Telemóvel</label>
                        <input type="tel" id="telefone" placeholder="9xx xxx xxx" required>
                    </div>

                    <div class="grupo-input">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="grupo-input">
                        <label for="confirmar-password">Confirmar Password</label>
                        <input type="password" id="confirmar-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-registar">Criar Conta</button>
                <p class="link-login">Já tem uma conta? <a href="login.html">Inicie sessão</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-auth.js"></script>
</body>
</html>
